<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetVida - Painel do Veterinário</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #10b981;       /* Verde Esmeralda */
            --primary-hover: #059669;
            --background: #f8fafc;    /* Fundo suave moderno */
            --surface: #ffffff;       /* Fundo dos cards */
            --text-main: #0f172a;     /* Texto quase preto */
            --text-muted: #64748b;    /* Texto cinza secundário */
            --border: #e2e8f0;        /* Linhas divisórias */
            --radius: 12px;           /* Bordas arredondadas */
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        /* Topo do Painel */
        header {
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
        }

        header span {
            font-size: 28px;
        }

        /* Layout em duas colunas para telas grandes */
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 350px 1fr;
            }
        }

        /* Estilo dos Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .card h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Formulários */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background-color: #fafafa;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        /* Botões */
        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button.btn-secundario {
            width: auto;
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 14px;
            margin-bottom: 16px;
        }

        button.btn-secundario:hover {
            background-color: rgba(16, 185, 129, 0.05);
        }

        /* Tabelas Modernas */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #f8fafc;
            color: var(--text-muted);
            padding: 12px 16px;
            font-weight: 600;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f8fafc;
        }

        /* Badge para o ID */
        .badge-id {
            background: #e2e8f0;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <span>🐾</span>
            <h1>PetVida Dashboard</h1>
        </header>

        <div class="grid">
            <div class="card">
                <h2>📝 Novo Veterinário</h2>
                <form id="formVet">
                    <div class="form-group">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" placeholder="Ex: Dr. Roberto Cefas" required>
                    </div>
                    <div class="form-group">
                        <label for="crmv">CRMV</label>
                        <input type="text" id="crmv" placeholder="Ex: CRMV-BA9999" required>
                    </div>
                    <div class="form-group">
                        <label for="especialidade">Especialidade</label>
                        <input type="text" id="especialidade" placeholder="Ex: Felinos" required>
                    </div>
                    <div class="form-group">
                        <label for="telefone">Telefone de Contato</label>
                        <input type="text" id="telefone" placeholder="Ex: (71) 98888-2222" required>
                    </div>
                    <button type="submit">Salvar no Banco</button>
                </form>
            </div>

            <div class="card">
                <h2>📋 Corpo Clínico Cadastrado</h2>
                
                <div style="display: flex; justify-content: flex-end;">
                    <button class="btn-secundario" onclick="carregarVeterinarios()">🔄 Atualizar Lista</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>CRMV</th>
                                <th>Especialidade</th>
                                <th>Telefone</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaVets">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function carregarVeterinarios() {
            const resposta = await fetch('/api/veterinarios');
            const veterinarios = await resposta.json();
            
            const tabela = document.getElementById('tabelaVets');
            tabela.innerHTML = ''; 

            veterinarios.forEach(vet => {
                tabela.innerHTML += `
                    <tr>
                        <td><span class="badge-id">#${vet.id}</span></td>
                        <td style="font-weight: 500;">${vet.nome}</td>
                        <td>${vet.crmv}</td>
                        <td>${vet.especialidade}</td>
                        <td style="color: var(--text-muted);">${vet.telefone}</td>
                    </tr>
                `;
            });
        }

        document.getElementById('formVet').addEventListener('submit', async (e) => {
            e.preventDefault();

            const dados = {
                nome: document.getElementById('nome').value,
                crmv: document.getElementById('crmv').value,
                especialidade: document.getElementById('especialidade').value,
                telefone: document.getElementById('telefone').value
            };

            const resposta = await fetch('/api/veterinarios', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            if (resposta.ok) {
                alert('Veterinário salvo no MySQL com sucesso!');
                document.getElementById('formVet').reset();
                carregarVeterinarios(); 
            } else {
                alert('Erro ao salvar. Verifique se o CRMV já existe.');
            }
        });

        carregarVeterinarios();
    </script>
</body>
</html>
